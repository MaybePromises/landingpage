<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maybe Promises</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 50px 20px;
      background-color: #697883;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    img {
      max-width: 300px;
      width: 80%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 40px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .button {
      display: block;
      width: 80%;
      max-width: 300px;
      padding: 15px 0;
      margin: 15px 0;
      background-color: #e9c3b2;
      color: #697883; /* Schriftfarbe angepasst */
      font-size: 1.2em;
      font-weight: bold;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .button:hover {
      background-color: #d4a898;
      transform: translateY(-2px);
    }

    .video-wrapper {
      width: 90%;
      max-width: 600px;
      margin: 30px 0;
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
      background-color: black;
    }

    .video-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      margin: 0;
      border-radius: 0;
      box-shadow: none;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70px;
      height: 70px;
      background-color: rgba(233,195,178,0.9);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 30px;
      color: #697883; /* ebenfalls angepasst */
    }
  </style>
</head>

<body>

  <img src="foto.jpg" alt="Maybe Promises Foto">

  <a href="https://open.spotify.com/intl-de/artist/4bycZoMTQSarMiLAnIdQfr?si=nAiuUqMGR8-7vr-iLPSVuw" target="_blank" class="button">Spotify</a>
  <a href="https://www.instagram.com/maybepromises/" target="_blank" class="button">Instagram</a>
  <a href="https://www.youtube.com/@MaybePromises" target="_blank" class="button">YouTube</a>

  <!-- Contact Button (bot-geschützt via Base64) -->
  <script>
    (function() {
      const encoded = "aW5mb0BtYXliZXByb21pc2VzLmNvbQ==";
      const email = atob(encoded);

      const link = document.createElement("a");
      link.href = "mailto:" + email + "?subject=Website%20Enquiry";
      link.className = "button";
      link.textContent = "Contact";

      document.body.appendChild(link);
    })();
  </script>

  <!-- Video 1 -->
  <div class="video-wrapper" onclick="loadVideo(this, '9PuOYAvVFDM')">
    <img src="https://img.youtube.com/vi/9PuOYAvVFDM/hqdefault.jpg" alt="Video Vorschau">
    <div class="play-button">▶</div>
  </div>

  <!-- Video 2 -->
  <div class="video-wrapper" onclick="loadVideo(this, 'A8p2zZJP8wI')">
    <img src="https://img.youtube.com/vi/A8p2zZJP8wI/hqdefault.jpg" alt="Video Vorschau">
    <div class="play-button">▶</div>
  </div>

  <script>
    function loadVideo(element, videoId) {
      element.innerHTML =
        '<iframe width="100%" height="100%" ' +
        'src="https://www.youtube-nocookie.com/embed/' + videoId + '?autoplay=1" ' +
        'frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
    }
  </script>

</body>
</html>
